server: 
    port: 0

springdoc:
    api-docs:
        path: /sucursal/api-docs

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

spring:
    application:
        name: sucursal
    flyway:
        enabled: 'true'
        baseline-on-migrate: 'true'
    jpa:
        show-sql: 'true'
    
    profiles:
        active: dev

---

spring:
    config:
        activate:
            on-profile: dev
    datasource:
        username: root
        url: jdbc:mysql://localhost:3306/sucursal?createDatabaseIfNotExist=true
        driverClassName: com.mysql.cj.jdbc.Driver
        password: ''
    jpa:
        hibernate:
            ddl-auto: validate

---

spring:
    config:
        activate:
            on-profile: test
    datasource:
        username: root
        url: jdbc:mysql://localhost:3306/sucursal?createDatabaseIfNotExist=true
        driverClassName: com.mysql.cj.jdbc.Driver
        password: ''
    jpa:
        hibernate:
            ddl-auto: validate

---

spring:
    config:
        activate:
            on-profile: prod
    datasource:
        username: root
        url: jdbc:mysql://localhost:3306/sucursal?createDatabaseIfNotExist=
        driverClassName: com.mysql.cj.jdbc.Driver
        password: ''
    jpa:
        hibernate:
            ddl-auto: none