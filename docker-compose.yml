services:
  mariadb-db:
    image: mariadb:10.11
    container_name: mariadb-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    networks:
      - network-ProyectoTI
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 20

  eureka-server:
    build: ./eureka/eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - network-ProyectoTI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build: ./gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - network-ProyectoTI
    depends_on:
      eureka-server:
        condition: service_healthy

  venta-service:
    build: ./venta
    container_name: venta-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DATABASE_HOST: mariadb-db
    networks:
      - network-ProyectoTI
    depends_on:
      mariadb-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  sucursal-service:
    build: ./sucursal
    container_name: sucursal-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DATABASE_HOST: mariadb-db
    networks:
      - network-ProyectoTI
    depends_on:
      mariadb-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  instrumento-service:
    build: ./instrumento
    container_name: instrumento-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DATABASE_HOST: mariadb-db
    networks:
      - network-ProyectoTI
    depends_on:
      mariadb-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  ProyectoTI-app-service:
    build: ./ProyectoTI-app
    container_name: ProyectoTI-app-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DATABASE_HOST: mariadb-db
    networks:
      - network-ProyectoTI
    depends_on:
      mariadb-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

networks:
  network-ProyectoTI:
    driver: bridge

volumes:
  mariadb-data: